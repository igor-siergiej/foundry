global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: cadvisor
    static_configs:
      - targets: ["cadvisor:8080"]

  - job_name: node-exporter
    static_configs:
      - targets: ["node-exporter:9100"]

  - job_name: loki
    static_configs:
      - targets: ["loki:3100"]
    metrics_path: /metrics

  - job_name: blocky
    static_configs:
      - targets: ["host.docker.internal:4000"]
    metrics_path: /metrics
