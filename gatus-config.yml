debug: false
metrics: true
storage:
  type: sqlite
ui:
  title: "Homelab Status"
  header: "Service Uptime"
endpoints:
  # Infrastructure checks
  - name: Domain Expiration
    group: Infrastructure
    url: https://imapps.uk
    interval: 3600s
    timeout: 10s
    conditions:
      - "[STATUS] == 200"
      - "[CERTIFICATE_EXPIRATION] > 7d"

  - name: DNS Resolution
    group: Infrastructure
    url: https://1.1.1.1/dns-query?name=imapps.uk&type=A
    interval: 300s
    timeout: 10s
    conditions:
      - "[STATUS] == 200"

  - name: ICMP Ping (Home)
    group: Infrastructure
    url: icmp://192.168.68.1
    interval: 60s
    timeout: 5s

  - name: NFS Server
    group: Infrastructure
    url: icmp://192.168.68.13
    interval: 60s
    timeout: 5s

  # Storage services
  - name: MongoDB
    group: Storage
    url: tcp://mongodb:27017
    interval: 60s
    timeout: 10s

  - name: MinIO (Storage)
    group: Storage
    url: http://minio:9000/minio/health
    interval: 60s
    timeout: 10s
    conditions:
      - "[STATUS] == 200"

  # Media services
  - name: Immich (Photos)
    group: Media
    url: http://immich/api/server/about
    interval: 60s
    timeout: 10s
    conditions:
      - "[STATUS] == 200"

  - name: Jellyfin (Media)
    group: Media
    url: http://jellyfin:8096/health
    interval: 60s
    timeout: 10s
    conditions:
      - "[STATUS] == 200"

  - name: Navidrome (Music)
    group: Media
    url: http://navidrome:4533/health
    interval: 60s
    timeout: 10s
    conditions:
      - "[STATUS] == 200"

  - name: AudiobookShelf
    group: Media
    url: http://audiobookshelf/health
    interval: 60s
    timeout: 10s
    conditions:
      - "[STATUS] == 200"

  # Automation & Core
  - name: Blocky (DNS)
    group: Core
    url: http://blocky:4000/health
    interval: 60s
    timeout: 10s
    conditions:
      - "[STATUS] == 200"

  - name: Home Assistant
    group: Core
    url: http://homeassistant:8123/api/
    interval: 60s
    timeout: 10s
    conditions:
      - "[STATUS] == 200"

  # Monitoring stack
  - name: Prometheus
    group: Monitoring
    url: http://prometheus:9090/-/healthy
    interval: 60s
    timeout: 10s
    conditions:
      - "[STATUS] == 200"

  - name: Grafana
    group: Monitoring
    url: http://grafana:3000/api/health
    interval: 60s
    timeout: 10s
    conditions:
      - "[STATUS] == 200"

  - name: Loki (Logs)
    group: Monitoring
    url: http://loki:3100/ready
    interval: 60s
    timeout: 10s
    conditions:
      - "[STATUS] == 200"
