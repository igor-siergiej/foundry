# Blocky DNS Server Configuration
# This DNS server is used for local split-horizon DNS
# It resolves *.imapps.uk to the local gateway to bypass the Cloudflare tunnel on LAN
# External DNS is still handled by Cloudflare

ports:
  dns: 53
  http: 4000

upstreams:
  groups:
    default:
      - 1.1.1.1
      - 8.8.8.8

customDNS:
  mapping:
    '*.imapps.uk': 192.168.68.18

caching:
  maxTime: 0s

log:
  level: info
