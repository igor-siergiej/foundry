version: '3.8'

services:
  blocky:
    image: spx01/blocky:latest
    container_name: blocky
    restart: unless-stopped
    ports:
      - "53:53/tcp"
      - "53:53/udp"
      - "4000:4000"
    volumes:
      - ./config.yml:/app/config.yml
    networks:
      - infra

networks:
  infra:
    driver: bridge
